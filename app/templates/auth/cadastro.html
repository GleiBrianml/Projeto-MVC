<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap');

  :root {
    --brand: #2563eb;
    --brand-dark: #1d4ed8;
    --surface: #ffffff;
    --bg: #f0f4ff;
    --text: #111827;
    --muted: #6b7280;
    --border: #d1d5db;
    --danger: #dc2626;
    --radius: 10px;
    --input-h: 44px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  form {
    background: var(--surface);
    border-radius: 18px;
    border: 0.5px solid var(--border);
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 400px;
  }

  /* Cadastro */
h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 26px;
  font-weight: 400;
  color: #1e3a5f;
  text-align: center;
  margin-bottom: 1.5rem;
  width: 100%;
}

body {
  flex-direction: column; /* adicione isso ao body existente */
}

  input[type="text"],
  input[type="email"],
  input[type="password"] {
    width: 100%;
    height: var(--input-h);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 0 14px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    background: var(--surface);
    outline: none;
    margin-bottom: 1rem;
    display: block;
    transition: border-color 0.15s;
  }

  input:focus {
    border-color: var(--brand);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
  }

  p[style*="color: red"] {
    color: var(--danger) !important;
    font-size: 13px;
    background: #fef2f2;
    border: 0.5px solid #fecaca;
    border-radius: var(--radius);
    padding: 10px 14px;
    margin-bottom: 1rem;
  }

  button[type="submit"] {
    width: 100%;
    height: 44px;
    background: var(--brand);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: background 0.15s, transform 0.1s;
  }

  button[type="submit"]:hover { background: var(--brand-dark); }
  button[type="submit"]:active { transform: scale(0.98); }


  p:last-child {
    text-align: center;
    margin-top: 1.25rem;
    font-size: 13px;
    color: var(--muted);
  }

  p:last-child a {
    color: var(--brand);
    text-decoration: none;
    font-weight: 500;
  }

  p:last-child a:hover { text-decoration: underline; }
</style>
</head>
<body>
    <h1>Criar Conta</h1>

    <form action="/auth/cadastro" method="post">
        Nome: <input type="text" name="nome" required>
        <br>
        E-mail: <input type="email" name="email" required>
        <br>
        Senha: <input type="password" name="senha" required>
        <br>

        {% if erro %}
            <p style="color: red;">{{ erro }}</p>
        {% endif %}

        <button type="submit">Cadastrar</button>
    </form>

    <p>Já tem uma conta? <a href="/auth/login">Faça login aqui</a></p>
</body>
</html>
