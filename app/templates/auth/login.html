<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Nunito:wght@400;500;600&display=swap');

  :root {
    --brand: #0d9488;
    --brand-dark: #0f766e;
    --brand-light: #f0fdfa;
    --surface: #ffffff;
    --bg: #f0fdf9;
    --text: #134e4a;
    --muted: #6b7280;
    --border: #ccfbf1;
    --border-input: #99f6e4;
    --danger: #dc2626;
    --radius: 10px;
    --input-h: 44px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  /* Login */
h1 {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  font-weight: 600;
  color: #134e4a;
  text-align: center;
  margin-bottom: 1.5rem;
  width: 100%;
}

body {
  flex-direction: column;
}

  form {
    background: var(--surface);
    border-radius: 18px;
    border: 0.5px solid var(--border);
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 400px;
  }

  input[type="email"],
  input[type="password"] {
    width: 100%;
    height: var(--input-h);
    border: 0.5px solid var(--border-input);
    border-radius: var(--radius);
    padding: 0 14px;
    font-size: 14px;
    font-family: 'Nunito', sans-serif;
    color: var(--text);
    background: var(--brand-light);
    outline: none;
    display: block;
    margin-bottom: 1rem;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  input:focus {
    border-color: var(--brand);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.12);
  }

  p[style*="color: red"] {
    color: var(--danger) !important;
    font-size: 13px;
    background: #fef2f2;
    border: 0.5px solid #fecaca;
    border-radius: var(--radius);
    padding: 10px 14px;
    margin-bottom: 1rem;
  }

  button[type="submit"] {
    width: 100%;
    height: 44px;
    background: var(--brand);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 600;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: background 0.15s, transform 0.1s;
  }

  button[type="submit"]:hover { background: var(--brand-dark); }
  button[type="submit"]:active { transform: scale(0.98); }

  p:last-child {
    text-align: center;
    margin-top: 1.25rem;
    font-size: 13px;
    color: var(--muted);
  }

  p:last-child a {
    color: var(--brand);
    text-decoration: none;
    font-weight: 600;
  }

  p:last-child a:hover { text-decoration: underline; }
</style>
</head>
<body>
    <h1>Fazer Login</h1>

    <form action="/auth/login" method="post">
        E-mail: <input type="email" name="email" required>
        <br>
        Senha: <input type="password" name="senha_hash" required>
        <br>

        {% if erro %}
            <p style="color: red;">{{ erro }}</p>
        {% endif %}

        <button type="submit">Fazer Login</button>
    </form>

    <p>Não tem uma conta? <a href="/auth/cadastro">Crie uma aqui</a></p>
</body>
</html>
